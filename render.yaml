# Render Blueprint for Murmur: React, Express + Socket.io, and PostgreSQL.
# The production client is served by Express, so the entire app uses one URL.

services:
  - type: web
    name: murmur-social
    runtime: node
    rootDir: server
    plan: free
    region: singapore
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: >-
      cd ../client &&
      npm ci &&
      npm run build &&
      cd ../server &&
      npm ci &&
      sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma &&
      npx prisma generate &&
      npx prisma db push --accept-data-loss &&
      npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: murmur-social-db
          property: connectionString
      - key: CLOUDINARY_FOLDER
        value: murmur

databases:
  - name: murmur-social-db
    plan: free
    region: singapore
    databaseName: murmur
    user: murmur
    postgresMajorVersion: "17"
    ipAllowList: []
