# Render Blueprint for the Murmur backend (Express + Socket.io + Postgres).
# Deploy: push this repo to GitHub, then in Render → "New +" → "Blueprint" and
# select the repo. After the first deploy, set CLIENT_URL (your Vercel URL) and
# API_URL (this service's URL) in the service's Environment settings, then redeploy.

services:
  - type: web
    name: murmur-api
    runtime: node
    rootDir: server
    plan: free
    healthCheckPath: /api/health
    # Switch Prisma to PostgreSQL for production, sync the schema, then build.
    buildCommand: >-
      npm install &&
      sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma &&
      npx prisma generate &&
      npx prisma db push --accept-data-loss &&
      npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: murmur-db
          property: connectionString
      # Set these two in the dashboard after the first deploy:
      - key: CLIENT_URL
        sync: false # e.g. https://your-app.vercel.app
      - key: API_URL
        sync: false # e.g. https://murmur-api.onrender.com

databases:
  - name: murmur-db
    plan: free
