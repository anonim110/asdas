<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Murmur</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        color: #e2e8f0;
        background:
          radial-gradient(45% 40% at 15% 0%, rgba(244, 63, 94, 0.28), transparent 60%),
          radial-gradient(40% 36% at 100% 8%, rgba(56, 89, 220, 0.26), transparent 60%),
          radial-gradient(48% 42% at 50% 112%, rgba(124, 58, 237, 0.22), transparent 62%),
          #070a14;
        overflow: hidden;
      }
      .card {
        text-align: center;
        padding: 36px 40px;
        border-radius: 24px;
        background: rgba(22, 24, 38, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 30px 80px -30px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        max-width: 360px;
      }
      .logo {
        width: 64px; height: 64px; margin: 0 auto 18px;
        border-radius: 18px;
        background: linear-gradient(135deg, #f43f5e, #fb923c);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 40px -6px rgba(244, 63, 94, 0.6);
      }
      .logo svg { width: 34px; height: 34px; }
      h1 { margin: 0 0 6px; font-size: 22px; font-weight: 800;
        background: linear-gradient(90deg, #fb7185, #93c5fd);
        -webkit-background-clip: text; background-clip: text; color: transparent; }
      p { margin: 0; font-size: 14px; color: #94a3b8; }
      .spinner {
        width: 34px; height: 34px; margin: 22px auto 0;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #f43f5e;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      button {
        margin-top: 22px; padding: 11px 22px;
        border: none; border-radius: 999px; cursor: pointer;
        font-weight: 700; font-size: 14px; color: #fff;
        background: linear-gradient(135deg, #f43f5e, #be123c);
        box-shadow: 0 12px 30px -12px rgba(244, 63, 94, 0.7);
        transition: transform 0.15s ease;
      }
      button:active { transform: scale(0.96); }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z" />
          <line x1="16" y1="8" x2="2" y2="22" />
          <line x1="17.5" y1="15" x2="9" y2="15" />
        </svg>
      </div>
      <h1>Murmur</h1>
      <p id="msg">Connecting…</p>
      <div id="spinner" class="spinner"></div>
      <button id="retry" class="hidden">Try again</button>
    </div>
    <script>
      const offline = new URLSearchParams(location.search).get('offline') === '1';
      const msg = document.getElementById('msg');
      const spinner = document.getElementById('spinner');
      const retry = document.getElementById('retry');
      if (offline) {
        msg.textContent = "Can't reach Murmur. Check your connection.";
        spinner.classList.add('hidden');
        retry.classList.remove('hidden');
      }
      retry.addEventListener('click', () => {
        msg.textContent = 'Connecting…';
        spinner.classList.remove('hidden');
        retry.classList.add('hidden');
        window.murmurDesktop && window.murmurDesktop.retry && window.murmurDesktop.retry();
      });
    </script>
  </body>
</html>
